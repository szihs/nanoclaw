<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-hover: #334155;
      --border: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --purple: #8b5cf6;
      --font: 'Courier New', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      height: 44px;
    }
    .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
    .header h1 span { color: var(--accent); }
    .tabs { display: flex; gap: 2px; }
    .tab {
      padding: 5px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      transition: all 0.15s;
    }
    .tab:first-child { border-radius: 4px 0 0 4px; }
    .tab:last-child { border-radius: 0 4px 4px 0; }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .tab:hover:not(.active) { background: var(--bg-hover); }
    .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* --- Tab Content --- */
    .tab-content { height: calc(100vh - 44px); display: none; }
    .tab-content.active { display: flex; }

    /* --- Tab 1: Pixel Office --- */
    #pixel-office { flex-direction: column; position: relative; }
    #office-canvas { flex: 1; image-rendering: pixelated; cursor: default; }
    .office-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 5px 12px; background: var(--bg-card);
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-dim); min-height: 28px;
    }
    .office-bar .stat { display: flex; align-items: center; gap: 4px; }
    .office-bar .dot { width: 6px; height: 6px; border-radius: 50%; }

    /* --- Detail Panel --- */
    .detail-panel {
      position: absolute; right: 0; top: 0; bottom: 28px; width: 320px;
      background: var(--bg-card); border-left: 1px solid var(--border);
      overflow-y: auto; display: none; padding: 14px; font-size: 11px; z-index: 10;
    }
    .detail-panel.visible { display: block; }
    .detail-panel h2 {
      font-size: 13px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .detail-panel .close-btn {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 14px; font-family: var(--font);
    }
    .detail-panel .field { margin-bottom: 6px; }
    .detail-panel .field label { color: var(--text-dim); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-panel .field .value { margin-top: 1px; }
    .detail-panel .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 10px; font-weight: 600;
    }
    .detail-panel .memory-preview {
      background: var(--bg); padding: 8px; border-radius: 4px;
      max-height: 180px; overflow-y: auto; font-size: 9px;
      white-space: pre-wrap; margin-top: 6px; color: var(--text-dim);
    }
    .detail-panel .hook-log { margin-top: 10px; }
    .detail-panel .hook-entry { padding: 2px 0; border-bottom: 1px solid var(--border); font-size: 9px; }
    .detail-panel .hook-entry .tool-name { color: var(--yellow); }
    .detail-panel .hook-entry .ts { color: var(--text-muted); }

    /* ============================== */
    /* Tab 2: Timeline / Audit Log    */
    /* ============================== */
    #observability { flex-direction: column; overflow: hidden; }

    /* Stats bar */
    .stats-row { display: flex; gap: 1px; background: var(--border); flex-shrink: 0; }
    .stat-box { background: var(--bg); padding: 10px 16px; flex: 1; text-align: center; }
    .stat-box .num { font-size: 20px; font-weight: 700; }
    .stat-box .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }

    /* Sparkline row */
    .sparkline-row {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 4px 16px; flex-shrink: 0;
    }
    .sparkline-row h3 {
      font-size: 9px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 2px;
    }

    /* Timeline list */
    .timeline-container {
      flex: 1; overflow-y: auto; padding: 0 16px;
    }
    .tl-entry {
      display: flex; gap: 0; padding: 0; min-height: 44px;
    }
    .tl-time {
      width: 64px; flex-shrink: 0; padding: 8px 0;
      font-size: 10px; color: var(--text-muted); text-align: right; padding-right: 10px;
    }
    .tl-line {
      width: 20px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
    }
    .tl-dot {
      width: 8px; height: 8px; border-radius: 50%; margin-top: 10px; flex-shrink: 0;
    }
    .tl-connector {
      width: 1px; flex: 1; background: var(--border); min-height: 10px;
    }
    .tl-content {
      flex: 1; padding: 6px 0 10px 8px; border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .tl-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tl-group { font-size: 11px; font-weight: 600; }
    .tl-type {
      font-size: 8px; padding: 1px 5px; border-radius: 2px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tl-type-task-run { background: var(--accent); color: white; }
    .tl-type-hook { background: var(--yellow); color: #1a1a2e; }
    .tl-title { font-size: 11px; color: var(--text); }
    .tl-prompt {
      font-size: 10px; color: var(--text-dim); margin-top: 2px;
      font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tl-detail {
      font-size: 10px; color: var(--text-muted); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tl-empty {
      padding: 40px 0; text-align: center; color: var(--text-muted); font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>NanoClaw</span> Dashboard</h1>
    <div class="tabs">
      <button class="tab active" data-tab="pixel-office">Pixel Office</button>
      <button class="tab" data-tab="observability">Timeline</button>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span id="ws-status">Connected</span>
    </div>
  </div>

  <!-- Tab 1: Pixel Art Office -->
  <div id="pixel-office" class="tab-content active">
    <canvas id="office-canvas"></canvas>
    <div class="detail-panel" id="detail-panel">
      <h2>
        <span id="detail-name">-</span>
        <button class="close-btn" id="detail-close">x</button>
      </h2>
      <div class="field"><label>Type</label><div class="value" id="detail-type">-</div></div>
      <div class="field"><label>Status</label><div class="value" id="detail-status">-</div></div>
      <div class="field"><label>Current Task</label><div class="value" id="detail-task">-</div></div>
      <div class="field"><label>Last Activity</label><div class="value" id="detail-activity">-</div></div>
      <div class="field"><label>Total Tasks</label><div class="value" id="detail-task-count">-</div></div>
      <div class="field"><label>Live Tool</label><div class="value" id="detail-tool">-</div></div>
      <div class="field">
        <label>Memory (CLAUDE.md)</label>
        <div class="memory-preview" id="detail-memory">Loading...</div>
      </div>
      <div class="hook-log" id="detail-hooks"></div>
    </div>
    <div class="office-bar">
      <div class="stat"><div class="dot" style="background:var(--green)"></div> <span id="stat-working">0</span> working</div>
      <div class="stat"><div class="dot" style="background:var(--yellow)"></div> <span id="stat-thinking">0</span> thinking</div>
      <div class="stat"><div class="dot" style="background:var(--text-dim)"></div> <span id="stat-idle">0</span> idle</div>
      <div class="stat"><div class="dot" style="background:var(--red)"></div> <span id="stat-error">0</span> error</div>
      <div style="flex:1"></div>
      <span id="stat-time"></span>
    </div>
  </div>

  <!-- Tab 2: Timeline / Audit Log -->
  <div id="observability" class="tab-content">
    <div class="stats-row">
      <div class="stat-box"><div class="num" id="obs-total-coworkers">0</div><div class="label">Coworkers</div></div>
      <div class="stat-box"><div class="num" id="obs-total-tasks">0</div><div class="label">Tasks</div></div>
      <div class="stat-box"><div class="num" id="obs-total-runs">0</div><div class="label">Runs</div></div>
      <div class="stat-box"><div class="num" id="obs-success-rate">-</div><div class="label">Success</div></div>
      <div class="stat-box"><div class="num" id="obs-avg-duration">-</div><div class="label">Avg Time</div></div>
    </div>
    <div class="sparkline-row">
      <h3>Activity (24h)</h3>
      <canvas id="sparkline-canvas" height="48"></canvas>
    </div>
    <div class="timeline-container" id="timeline-list">
      <div class="tl-empty">No events yet. Spawn a coworker or schedule a task to see the timeline.</div>
    </div>
  </div>

  <script src="sprites.js"></script>
  <script src="app.js"></script>
</body>
</html>
