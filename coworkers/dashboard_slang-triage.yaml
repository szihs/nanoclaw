  feedback_quarterly_reproduction.md: >
    ---

    name: Quarterly triage must reproduce bugs

    description: Quarterly re-triage requires actually running slangc against bug repro cases, not just checking
    PR/issue metadata

    type: feedback

    ---


    Quarterly re-triage of bugs MUST include actual reproduction on top-of-tree, not just metadata checks (merged PRs,
    issue states, comment activity).


    **Why:** The main value of quarterly re-triage is discovering bugs that have been silently fixed. Without running
    the reproducer, we can't close fixed bugs or apply the `reproduced` label to confirmed ones. A metadata-only pass
    misses the entire point.


    **How to apply:** For every bug with repro steps in the quarterly milestone:

    1. Pull latest slang, rebuild slangc

    2. Extract the repro case from the issue

    3. Run it with slangc on top-of-tree

    4. If fixed → close the issue

    5. If still reproduces → apply `reproduced` label

    6. If no repro steps available → note in triage log, skip reproduction
  feedback_repro_fidelity.md: >
    ---

    name: Reproduction must match reported target exactly

    description: Quarterly re-triage must test the exact target/command from the issue — other targets passing does not
    confirm a fix

    type: feedback

    ---


    Only the reported target and exact reproduction steps matter for determining "fixed". Do not test other targets and
    claim the issue is resolved.


    **Why:** Testing SPIR-V/HLSL/GLSL when the reporter specified `host-cpp` proves nothing about the reported problem.
    Each backend has its own code paths. A fix on one target does not imply a fix on another.


    **How to apply:**

    1. Extract the exact command(s) from the issue description

    2. Run those exact commands (same target, same flags)

    3. If the exact command cannot be run in the sandbox, you cannot make a determination — report this and leave open

    4. Do not substitute a different target and claim equivalence

    5. Keep closing comments concise — state what was tested (exact command), result, commit hash. No extra targets, no
    verbose explanations.
  feedback_spirv_validation.md: >
    ---

    name: SPIR-V validation requires spirv-val

    description: When triaging SPIR-V issues, must run spirv-val on output — slangc exit code alone is not sufficient

    type: feedback

    ---


    When triaging issues about invalid SPIR-V output, running `slangc` without errors is NOT sufficient to declare
    "fixed". The compiler can emit structurally invalid SPIR-V that only `spirv-val` detects.


    **Why:** Erroneous closure of #7047 on 2026-04-14 — bot ran slangc, saw clean exit, closed as fixed. Reporter
    reopened because `spirv-val` still shows the error.


    **How to apply:** For any issue mentioning SPIR-V validation errors, structured control flow violations, or
    spirv-val failures: always run `spirv-val` on the generated `.spv` file. If spirv-val is not available in the
    sandbox, note that in the triage report rather than assuming the issue is fixed.
