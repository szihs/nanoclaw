    ---

    name: Feedback Review

    description: Process for checking issues with 'Needs reporter feedback' label for new responses, and re-running
    triage when info is provided

    type: project

    ---


    # Feedback Review


    Common rules (guardrails, environment, process, reporting, GitHub policies) are in `triage_common.md`. The triage
    process (reproduction, investigation, regression bisection) is in `triage_workflow.md`.


    **Purpose**: Check open issues where we requested additional information from the reporter. When they respond,
    re-run triage with the new information.


    **Schedule**: Runs during daily triage, before inbox processing.


    ## Process


    ### 1. Query Issues

    Search for all open issues in `shader-slang/slang` with the `Needs reporter feedback` label.


    ### 2. Check Each Issue

    For each issue:


    1. Fetch and read all comments on the issue

    2. Find our most recent comment that requested information

    3. Check if the reporter (or any non-COLLABORATOR) has commented after that request

    4. If no new comments from the reporter since our request, skip to the next issue


    ### 3. Re-run Triage

    If the reporter has responded with new information:


    1. Check how many times we have already requested information on this issue (count our comments that ask for more
    details)

    2. If we have asked **2 or more times** already, do not re-triage — leave the `Needs reporter feedback` label in
    place and move on

    3. Otherwise, re-run `triage_workflow.md` on the issue — the new information may allow reproduction to proceed
    further than before
  triage_quarterly.md: >
    ---

    name: Quarterly Triage Process

    description: Quarterly re-triage — inbox-based batch processing of milestone issues via triage_workflow.md

    type: project

    ---


    # Quarterly Triage


    **Schedule**: Manual — user invokes with a milestone name (e.g., "run quarterly triage on Q4 2025 (Fall)")

    **Purpose**: Re-validate old milestone issues — run the triage workflow again to see if anything has changed since
    the issue was filed.

    **Batch size**: 50 issues per invocation


    Common rules (guardrails, environment, process, reporting, GitHub policies) are in `triage_common.md`. The triage
    process (reproduction, investigation, regression bisection) is in `triage_workflow.md`.


    **Conservative stance**: Err on the side of caution. Only apply `suggest_close` when evidence is unambiguous. For
    anything uncertain, report findings and leave open.


    ## Step 1: Populate Inbox (first invocation only)


    On first invocation for a milestone, build the inbox at `triage/quarterly/{milestone-slug}-inbox.txt`:


    1. Query all open issues in the requested milestone

    2. Sort oldest first

    3. Write all issue numbers to the inbox file


    ## Step 1.5: Inbox Cleanup

    - Before triaging, remove any issues from the inbox that have been closed since they were added.


    ## Step 2: Triage from Inbox


    1. Take the next **50** issues from the top of the inbox

    2. Triage each one following the process in `triage_workflow.md`
       - If the issue has a prior triage log, update it incrementally — don't repost a full report that already exists
       - If triage produces new findings compared to the prior log, post an internal triage report with the delta
       - If nothing new can be determined (issue is unchanged, no new code activity, can't reproduce or validate), report that in the triage log and move on
    3. After `triage_workflow.md` runs to completion on an issue, **remove it from the inbox**

    4. Remaining issues stay in the inbox for the next invocation



    ## Batch Reporting


    After each invocation, send a summary to the dashboard with:

    - Total issues processed in this batch

    - Breakdown by outcome: reproduced, appears fixed (`suggest_close` applied), no repro code available, can't test in
    sandbox, needs reporter feedback

    - Issues requiring human intervention — list each with a one-line reason (e.g., "slang-1234 — behavior-by-design,
    needs COLLABORATOR confirmation")


    ## Completion


    When the inbox is empty, produce a collected summary report. Save to `triage/quarterly/{milestone-slug}-summary.md`.
  triage_workflow.md: >+
    ---

    name: Slang Triage Workflow

    description: Triage process for shader-slang/slang — reproduction, code investigation, regression bisection, issue
    types, scope

    type: project

    ---


    # Slang Triage Workflow


    This file defines the *triage process* — how to reproduce, investigate, and bisect issues. Common rules (guardrails,
    environment, process, reporting, GitHub policies) are in `triage_common.md`. Issue selection is in
    `triage_daily.md`.


    ## Issue Ingestion


    Before any other step:


    1. Create the triage directory `triage/<repo>-<issue>/` (e.g., `triage/slang-10500/`) if it doesn't already exist

    2. Fetch and read the full issue description (body)

    3. Fetch and read all comments on the issue

    4. Check current labels, milestone, and assignee (if any)


    Use this to understand what the reporter is experiencing, which component is affected, and whether any prior triage
    or developer response already exists.



    ## Reproduction


    Work through the following in order. Stop at the first matching branch.


    1. **Not applicable for reproduction**: If the issue has no compilable code or test case (e.g., documentation
    request, build issue, CI issue, question, feature description without sample code), skip the Reproduction section
    entirely and proceed directly to Code Investigation. Note in the triage log that reproduction was skipped and why.
    **Exception**: feature requests that include sample code and expected output can be tested like bug reports — run
    the code to see if the feature is already implemented, then proceed to Code Investigation regardless of outcome.


    2. **Missing/incomplete repro steps**: If the reporter is external and forgot to include repro steps or they're
    wrong/incomplete, post a polite comment thanking them for their report and asking for the specific missing detail
    needed. No approval required. Apply the `Needs reporter feedback` label. Skip to Finalize.


    3. **Can't run locally**: If repro steps are clear but we can't run them locally (e.g., requires Windows, specific
    hardware), note it in the internal report and skip ahead to Code Investigation. For GPU-dependent issues: if the
    reporter's GPU vendor (Intel, AMD) differs from ours (NVIDIA), attempt reproduction on our GPU anyway — if it
    reproduces, the bug is confirmed. If it does not reproduce on our GPU, that does not mean the issue is invalid —
    vendor-specific issues are common. Note the vendor mismatch in the report, do not close, and continue to Code
    Investigation.


    4. **Reproduced**: If the issue reproduces, apply the `reproduced` label. If the `Needs reporter feedback` label is
    present and no other questions remain for the reporter, remove it. Check for regression indicators:
       - Reporter says "this used to work", "regression", or names a version where it last worked
       - Issue title or labels include "regression"
       - Any other indication from the reporter or other commenters suggesting it is a regression
       
       If regression is indicated, proceed to Regression Bisection. Otherwise, continue to Code Investigation.

    5. **Not reproduced on top-of-tree**: If repro steps are clear and the issue does not reproduce on top-of-tree,
    apply the `not reproduced` label. Then verify against the reporter's version before deciding:

       a. **Confirm on reported version**: Download the release binary matching the version the reporter used (or check out the specific commit if they reported against origin/main). Run the same repro steps against that version.
          - If the issue **reproduces on the reported version**: the bug existed and has since been fixed. This is the "Already fixed" case — proceed to (b).
          - If the issue **does not reproduce on the reported version either**: we cannot reproduce at all. Skip to (c).

       b. **Already fixed**: The issue reproduces on the reported version but not on top-of-tree. Post a polite comment stating which release or commit fixed it (or "top of tree"), include the commit hash tested. If the `Needs reporter feedback` label is present and no other questions remain for the reporter, remove it. Apply `suggest_close` per closure rules in `triage_common.md`. Skip to Finalize.

       c. **Can't reproduce (neither version)**: The issue doesn't reproduce on either the reported version or top-of-tree. Post a polite comment explaining we couldn't reproduce on either version and ask the reporter for more details (OS, GPU, driver version, exact flags, etc.). Apply the `Needs reporter feedback` label. Do not close. Skip to Finalize.

    ## Regression Bisection


    Only attempt bisection if the issue reproduces on top-of-tree (Reproduction step 4) and is claimed to be a
    regression:


    ### Phase 1: Binary search on GitHub releases (fast, no build needed)

    - Download `slangc` binaries from the GitHub releases page for `shader-slang/slang`

    - Binary search across release versions to find the two adjacent releases where the regression was introduced

    - This narrows the window quickly without any compilation


    ### Phase 2: git bisect between bounding releases

    - Once the two bounding release tags are identified, use `git bisect` between them

    - **Critical**: always run `git submodule update --init --recursive` after each bisect step before building

    - Build with `cmake --preset default --fresh && cmake --build --preset release --target slangc slang-test`

    - Test with the reproduction case at each step

    - Report the first bad commit

    - **Build failure**: If a build fails at any bisect step, skip that commit (`git bisect skip`). If builds fail
    repeatedly and bisection cannot converge, report "failed to bisect — build failures" in the triage log and move on
    to Code Investigation.


    ## Code Investigation


    - Before starting code investigation, ensure the repo is back on top-of-tree (`origin/master`) and rebuilt if a
    different version was checked out during reproduction or bisection.

    - Primary investigation is code research in the local repo. Use the documentation in the slang repository
    (especially `docs/command-line-slangc-reference.md` and `CLAUDE.md`) to guide investigation.

    - When a repro shader is available, use `-dump-ir` appended to the original repro command (preserving all flags,
    target, etc.) to inspect IR at every pass. Key usage rules:
      - Always combine with `-target` and `-o <file>` — without `-o`, target code mixes with IR on stdout
      - Example: `slangc <original flags> -target spirv-asm -o tmp.spv repro.slang -dump-ir`
      - Use `extras/split-ir-dump.py` to split large dumps into per-pass files
      - Use `-dump-ir-before <pass>` / `-dump-ir-after <pass>` to narrow down to specific passes
      - This helps pinpoint which IR pass introduces the defect
    - Once high confidence on relevant passes/source lines, fan out to:
      - PRs that introduced that code
      - Comments and reviews on those PRs
      - Associated issues
    - Use this to generate a report of related issues.

    - Use `git blame` and `git log` on crash-relevant files to identify engineers who last changed the code.

    - Check authors and reviewers of related PRs.

    - Include a "Relevant Engineers" section in the triage report.


    ### Finalize

    After investigation is complete:

    1. Write the triage log per the template in `triage_common.md`

    2. Post the internal triage report as a GitHub comment

    3. Apply any labels indicated by the findings (e.g., component labels, `reproduced`, `suggest_close`)

    4. Triage for this issue is now complete


    ## Issue Types (GitHub native)

    - Only set Issue Type after we have confirmed the reporter's claim (e.g., reproduced the bug, or validated the
    feature request). Normally this is after full triage, but can be earlier if clear (e.g., before early out).

    - If the issue's Type is blank and we've confirmed:
      - Bug → set Type to "Bug"
      - Feature request → set Type to "Feature"
      - If unsure, leave Type untouched
    - Query issue type: `gh api graphql` with `repository.issue.issueType`

    - Set issue type via `updateIssue` mutation with `issueTypeId`

    - Type IDs for shader-slang/slang:
      - Bug: `IT_kwDOAb2kZs4AXYkt`
      - Feature: `IT_kwDOAb2kZs4AXYkw`
      - Task: `IT_kwDOAb2kZs4AXYkr`

    ## Scope

    - Currently: `shader-slang/slang` only

    - Future: will expand to `slangpy` and possibly specs repositories

