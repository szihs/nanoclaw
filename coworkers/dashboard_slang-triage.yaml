    ---

    name: Daily Triage Selection

    description: Issue selection criteria and schedule for daily triage — automated weekdays at 9 AM ET

    type: project

    ---


    # Daily Triage


    Common rules (guardrails, environment, process, reporting, GitHub policies) are in `triage_common.md`. The triage
    process (reproduction, investigation, regression bisection) is in `triage_workflow.md`. Quarterly triage has its own
    document: `triage_quarterly.md`.


    **Schedule**: Automated, 9:00 AM EST, weekdays (Mon–Fri)


    ### Daily Triage Phases


    Run in order:


    #### Phase 1: Feedback Review

    Check issues awaiting reporter response per `triage_feedback_review.md`.


    #### Phase 2: New Issue Triage


    Uses a persistent inbox (`triage/daily-triage-inbox.txt`) so issues that exceed the daily cap carry over to
    subsequent days.


    **Step 1: Populate Inbox**

    1. Query all issues in `shader-slang/slang` created after the date in `triage/last-run.txt`

    2. Append qualifying issues to `triage/daily-triage-inbox.txt` (avoid duplicates — check before appending)

    3. Update `triage/last-run.txt` with today's date


    **Step 1.5: Inbox Cleanup**

    - Remove any issues from the inbox that have been closed since they were added.


    **Step 2: Triage from Inbox**

    1. Sort the full inbox by **priority order**:
       - Newest open issues first (by `created_at` date, descending)
       - External reporters over COLLABORATORs
       - Unlabeled issues first
    2. Take the top **15** issues and triage each one following the process in `triage_workflow.md`

    3. After `triage_workflow.md` runs to completion on an issue, **remove it from the inbox**

    4. If the issue now has the `reproduced` label, send a message to Slang Fixer: "Fix issue #{ issue number }" (e.g.,
    "Fix issue #10500")

    5. Remaining issues (if any) stay in the inbox for the next run
