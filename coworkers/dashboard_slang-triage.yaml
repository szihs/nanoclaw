    # GitHub Access


    - **Bot identity**: `slang-coworker-nanoclaw[bot]`

    - **Auth method**: GitHub App installation token (via GH_TOKEN)

    - **Repo**: `shader-slang/slang` — read/write access to issues, labels, comments, issue types

    - **Projects**: Access to 13 private org-level ProjectsV2 boards (granted 2026-04-13)

    - **Known limitation**: Write access can intermittently return 403 "Resource not accessible by integration" — if
    this happens, note it and retry later or alert the user


    ## Issue Type IDs (shader-slang/slang)

    - Bug: `IT_kwDOAb2kZs4AXYkt`

    - Feature: `IT_kwDOAb2kZs4AXYkw`

    - Task: `IT_kwDOAb2kZs4AXYkr`


    ## Setting Issue Type

    ```

    NODEID=$(gh api repos/shader-slang/slang/issues/NUMBER --jq '.node_id')

    gh api graphql -f query='mutation { updateIssue(input: { id: "'"$NODEID"'", issueTypeId: "TYPE_ID" }) { issue {
    title } } }'

    ```


    ## SSL Note

    - `git pull` in the slang repo requires `GIT_SSL_NO_VERIFY=1` due to certificate verification failures in the
    sandbox
