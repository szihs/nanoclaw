    ---

    name: Dashboard uses standard markdown

    description: Dashboard channel requires standard markdown links [text](url), not Slack mrkdwn <url|text> format

    type: feedback

    ---


    Use standard markdown formatting when responding to the Dashboard channel, not Slack mrkdwn syntax.


    **Why:** Slack-style links (`<url|text>`) don't render correctly on the Dashboard. The Dashboard expects standard
    markdown (`[text](url)`).


    **How to apply:** Check the message sender — if it's "Dashboard", use standard markdown (headings, `**bold**`,
    `[links](url)`). Only use Slack mrkdwn for channels whose folder starts with `slack_`.
