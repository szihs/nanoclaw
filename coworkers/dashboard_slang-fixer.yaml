  feedback_build_commands.md: >
    ---

    name: Slang build commands

    description: Use --fresh flag for cmake configure and debug preset for builds

    type: feedback

    ---


    Use `cmake --preset default --fresh` for configure and `cmake --build --preset release` for building slang.


    **Why:** User explicitly corrected the default build instructions. The `--fresh` flag ensures a clean configure.
    Release preset is preferred.


    **How to apply:** Every time building the slang project, use these exact commands instead of what's in the default
    CLAUDE.md instructions.
  feedback_fix_workflow.md: >
    ---

    name: Fix workflow — iterate and verify before pushing

    description: Keep iterating on fixes until the repro test passes; read slang CLAUDE.md first; never push/PR until
    verified

    type: feedback

    ---


    When fixing slang issues:


    1. Read the slang repo's CLAUDE.md first to bootstrap knowledge about the codebase

    2. Create a repro test from the issue — must verify two things before proceeding:
       a. The test reproduces the *same problem* identified in the issue (not a different failure)
       b. The test can actually run on the local environment — if it requires a runtime/target not available locally (e.g., HLSL runtime, Metal), stop early and report that the issue can't be tested locally
    3. Iterate on the fix until all quality bars pass — do not stop at the first attempt

    4. Maximum 100 iterations — if not solved by then, stop without pushing

    5. Only push the branch and create a PR after ALL three quality bars are met

    6. If quality bars aren't met, do NOT push a PR — report what was tried and where you got stuck


    ## Quality Bars (all three must pass before pushing)


    1. **Repro test passes** — the test created from the issue passes with the fix

    2. **Full test suite passes** — run `slang-test` on all tests in `tests/` for all targets supported locally, with NO
    modifications to existing tests by the patch (only new test files added)

    3. **Code review passes** — spawn a subagent to review the patch; the reviewer must also read the original issue and
    all its comments/feedback (`gh issue view <number> -R shader-slang/slang --comments`) to judge the fix against the
    full context; all critical and major issues it identifies must be fixed; minor/trivial issues must be either fixed
    or have reasonable explanations


    **Why:** Pushing broken or low-quality fixes wastes reviewer time and clutters the repo. The goal is a working,
    quality solution — or an honest report of failure.


    **How to apply:** Never run `git push` or `gh pr create` until all three quality bars are met. If after 100
    iterations the fix still isn't passing, stop and report findings without pushing. The patch must not modify existing
    test files — only add new ones.
  feedback_reporting.md: >
    ---

    name: Report locally, never comment on issues

    description: All progress reporting via local console/chat only; never post on GitHub issues unless submitting a PR

    type: feedback

    ---


    All reporting (progress, findings, failures) should be done through chat via `send_message`. Never post comments on
    the GitHub issue unless you have a PR to submit.


    **Why:** Posting partial progress or failure notes on issues creates noise for maintainers and other contributors.


    **How to apply:** Use `send_message` for all status updates and reporting. Only interact with the GitHub issue when
    creating a PR that links to it.
