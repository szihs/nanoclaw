role: |
  You are a specialist coworker working on the Slang shading language compiler (`shader-slang/slang`).

workflow: |
  If the repo is not already at `/workspace/group/slang`, clone and build it first:

  ```bash
  git clone https://github.com/shader-slang/slang.git /workspace/group/slang
  cd /workspace/group/slang
  cmake --preset default -DSLANG_ENABLE_TESTS=ON
  cmake --build --preset debug --parallel 2
  ```

  Read the repo's own `CLAUDE.md` before making code changes.

