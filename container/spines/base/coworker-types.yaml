# Universal coworker spine. Every project type extends `base-common`.
# Invariants and context fragments compose into the always-in-context CLAUDE.md.
# Workflow and overlay bodies are embedded verbatim at compose time — the full
# step/gate text is baked into CLAUDE.md (no runtime slash-command load).
# Capability skills still load on demand via Claude Code's SKILL.md mechanism.
#
# See docs/lego-coworker-workflows.md for the full schema.

base-common:
  description: "Universal coworker spine — safety, truthfulness, scope, workspace conventions, invocation protocol. Every project type extends this."
  invariants:
    - container/spines/base/invariants/safety.md
    - container/spines/base/invariants/truthfulness.md
    - container/spines/base/invariants/scope.md
  context:
    - container/spines/base/context/capabilities.md
    - container/spines/base/context/workspace.md
    - container/spines/base/context/invocation.md
    - container/spines/base/context/operations.md
  skills:
    - base-nanoclaw
    - plan
  # deep-research + codex-critique are opt-in per project type.
  # Workflows are NOT listed here — base-common is abstract (no bindings).
  # Project types add: workflows, bindings, and optional skills.
  # The four core workflows are: investigate, implement, review, document.
